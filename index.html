    body {
        font-family: var(--font-body);
        background:
            radial-gradient(circle at top left, rgba(255,255,255,0.96) 0%, rgba(248,248,247,0.98) 42%, rgba(241,245,249,0.96) 100%);
        background-color: var(--bg-void);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
    }

    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
            radial-gradient(ellipse 58% 36% at 12% 0%, rgba(255,255,255,0.74) 0%, transparent 60%),
            radial-gradient(ellipse 36% 30% at 92% 100%, rgba(226,232,240,0.32) 0%, transparent 55%);
        pointer-events: none;
        z-index: 0;
    }

    body::after {
        content: '';
        position: fixed;
        inset: 0;
        background: linear-gradient(180deg, rgba(255,255,255,0.26), rgba(248,248,247,0.12));
        pointer-events: none;
        z-index: 0;
    }

    #app-root { position: relative; z-index: 1; }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    .animate-fade-in { animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-fade-up { animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-spin-slow { animation: spin 1s linear infinite; }

    /* ── Glass card ── */
    .glass-card {
        background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(255,255,255,0.86));
        border: 1px solid rgba(255,255,255,0.82);
        border-radius: 20px;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        box-shadow: 0 12px 36px rgba(15,23,42,0.08), 0 0 0 1px rgba(255,255,255,0.5);
    }

    /* ── Input ── */
    .form-input {
        width: 100%;
        background: rgba(255,255,255,0.92);
        border: 1px solid rgba(203,213,225,0.85);
        border-radius: 10px;
        color: var(--text-primary);
        font-family: var(--font-body);
        font-size: 15px;
        padding: 0.72rem 0.9rem;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
        -webkit-appearance: none;
        box-shadow: inset 0 1px 2px rgba(15,23,42,0.03);
        box-sizing: border-box;
    }
    .form-input:focus {
        border-color: var(--cyan);
        box-shadow: 0 0 0 3px var(--cyan-glow);
    }
    .form-input::placeholder { color: var(--text-muted); }
    .form-input option { background: #fff; color: var(--text-primary); }

    /* ── Label ── */
    .field-label {
        font-family: var(--font-mono);
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #64748b;
        display: block;
        margin-bottom: 5px;
    }

    /* ── Primary button ── */
    .btn-primary {
        background: linear-gradient(180deg, #3b82f6, #2563eb);
        border: 1px solid rgba(37,99,235,0.28);
        color: white;
        font-family: var(--font-head);
        font-weight: 700;
        font-size: 14px;
        letter-spacing: 0.03em;
        padding: 0.78rem 1.4rem;
        border-radius: 12px;
        transition: all 0.2s;
        cursor: pointer;
        box-shadow: 0 10px 24px rgba(37,99,235,0.18);
        min-height: 44px;
    }
    .btn-primary:hover {
        background: linear-gradient(180deg, #60a5fa, #2563eb);
        box-shadow: 0 14px 28px rgba(37,99,235,0.24);
        transform: translateY(-1px);
    }
    .btn-primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }

    /* ── Secondary button ── */
    .btn-secondary {
        background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(241,245,249,0.92));
        border: 1px solid rgba(203,213,225,0.8);
        color: var(--text-secondary);
        font-family: var(--font-head);
        font-weight: 600;
        font-size: 14px;
        padding: 0.72rem 1.2rem;
        border-radius: 12px;
        transition: all 0.2s;
        cursor: pointer;
        min-height: 44px;
        box-shadow: 0 4px 12px rgba(15,23,42,0.06);
    }
    .btn-secondary:hover {
        border-color: var(--border-bright);
        color: var(--text-primary);
        transform: translateY(-1px);
    }

    /* ── Status badges ── */
    .badge-approved { background: #ecfdf5; color: #166534; border: 1px solid #bbf7d0; }
    .badge-rejected { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .badge-pending  { background: #fff7ed; color: #b45309; border: 1px solid #fed7aa; }
    .badge-active   { background: #ecfdf5; color: #166534; border: 1px solid #bbf7d0; }
    .badge-expired  { background: #f8fafc; color: #64748b; border: 1px solid #e2e8f0; }

    .status-card-approved { background: rgba(22,163,74,0.04); border-color: rgba(22,163,74,0.18); }
    .status-card-rejected { background: rgba(220,38,38,0.04); border-color: rgba(220,38,38,0.18); }
    .status-card-pending  { background: rgba(217,119,6,0.04);  border-color: rgba(217,119,6,0.18); }
    .status-card-active   { background: rgba(22,163,74,0.04); border-color: rgba(22,163,74,0.18); }
    .status-card-expired  { background: rgba(148,163,184,0.06); border-color: rgba(148,163,184,0.2); }

    /* ── Date picker ── */
    input[type="date"]::-webkit-calendar-picker-indicator {
        filter: none;
        opacity: 0.6;
        cursor: pointer;
    }

    /* Readonly date */
    input[readonly].form-input {
        background: rgba(241,245,249,0.85);

    }

    /* ── Section divider ── */
    .divider {
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(148,163,184,0.3), transparent);
        margin: 0.5rem 0;

    .mobile-vehicle-number {
        font-size: clamp(1rem, 5vw, 1.4rem);

        word-break: break-all;

        max-width: 320px;
        animation: fadeUp 0.3s cubic-bezier(0.16,1,0.3,1) forwards;

    .notif-info    { background: rgba(10,25,48,0.94); border: 1px solid rgba(59,130,246,0.3); color: #e0eeff; }
</style>

                            <option value="18:00-onwards">18:00 onwards</option>
                        </select>
                    </div>

                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                        <div>${FL('Entry Date')}<input type="date" id="request-entry-date" name="entryDate" min="${minDateString}" class="form-input" required></div>
                        <div>${FL('Expiry Date')}<input type="date" id="request-expiry-date" name="expiryDate" class="form-input" readonly></div>
                    </div>

                    <div>
                        ${FL('Purpose of Entry')}
                        <select id="notes-purpose-select" name="notes_purpose" class="form-input">
                            <option>Meeting</option><option>Visit</option><option>Maintenance</option>
                            <option>Delivery</option><option>Towing</option><option value="Others">Others</option>
                        </select>
                        <input type="text" id="notes-other-input" name="notes_other" class="form-input" style="display:none;margin-top:8px;" placeholder="Please specify purpose">
                    </div>

                    <div style="height:1px;background:linear-gradient(90deg,transparent,rgba(148,163,184,0.3),transparent);margin:4px 0;"></div>

                    <div style="display:flex;gap:10px;padding-top:2px;">
                        <button id="back-btn" type="button" class="btn-secondary" style="flex:1;">
                            <span style="display:flex;align-items:center;justify-content:center;gap:6px;">${icons.arrow} Back</span>
                        </button>
                        <button type="submit" class="btn-primary" style="flex:2;">Submit Request</button>
                    </div>

                </form>
            </div>
        </div>`;
    };

    // ─────────────────────────────────────────
    //  STATUS CARD
    // ─────────────────────────────────────────
    const createStatusCard = (r) => {
        const cfg = {
            approved: { label: "APPROVED",         badge: "badge-approved", card: "status-card-approved" },
            rejected: { label: "REJECTED",         badge: "badge-rejected", card: "status-card-rejected" },
            pending:  { label: "PENDING REVIEW",   badge: "badge-pending",  card: "status-card-pending"  },
            active:   { label: "ACTIVE CLEARANCE", badge: "badge-active",   card: "status-card-active"   },
            expired:  { label: "EXPIRED",          badge: "badge-expired",  card: "status-card-expired"  },
        };
        const c = cfg[r.status] || cfg.pending;
        const timeSlotText = r.timeSlot ? r.timeSlot.replace('-', ' to ').replace('onwards', ' onwards') : 'N/A';
        const contact = r.requesterContact || r.ownerContact || 'N/A';
        const name    = r.requesterName || r.ownerName || 'N/A';
        const host    = r.host || 'N/A';

        const row = (label, value) => `
        <div>
            <p style="font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#94a3b8;margin:0 0 2px;">${label}</p>
            <p style="font-size:13px;font-weight:600;color:#1f2937;margin:0;">${value}</p>
        </div>`;

        return `
        <div class="animate-fade-in ${c.card}" style="border-radius:12px;border;padding:14px;">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
                <div>
                    <p style="font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#94a3b8;margin:0 0 2px;">Vehicle</p>
                    <p class="mobile-vehicle-number" style="font-family:'JetBrains Mono',monospace;font-weight:800;color:#2563eb;margin:0;">${r.vehicleNumber}</p>
                    <p style="font-size:11px;color:#94a3b8;margin:2px 0 0;">${r.vehicleType || 'Car'}</p>
                </div>
                <span class="${c.badge}" style="font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.06em;padding:4px 8px;border-radius:4px;">${c.label}</span>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px;">
                ${row('Driver / Owner', name)}
                ${row('Contact', contact)}
                ${row('Host', host)}
                ${row('Parking', r.location)}
                ${row('Visiting Hours', timeSlotText)}
                <div style="grid-column:1/-1;">${row('Valid Period', `${formatDate(r.entryDate)} — ${formatDate(r.expiryDate)}`)}</div>
            </div>
            ${r.notes ? `<div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(148,163,184,0.2);">${row('Purpose', r.notes)}</div>` : ''}
            ${r.rejectionReason ? `<div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(220,38,38,0.15);">${row('Rejection Reason', `<span style="color:#b91c1c;">${r.rejectionReason}</span>`)}</div>` : ''}
        </div>`;
    };

    // ─────────────────────────────────────────
    //  FIND STATUS
    // ─────────────────────────────────────────
    const findCurrentVehicleStatus = async (vehicleNumber) => {
        const now = new Date();
        const clearanceQuery = query(collection(db, "vehicleClearances"), where("vehicleNumber", "==", vehicleNumber));
        const clearanceSnap = await getDocs(clearanceQuery);
        const activeClearance = clearanceSnap.docs
            .map(d => ({ id: d.id, ...d.data() }))
            .find(data => data.expiryDate.toDate() >= now);

        if (activeClearance) return { ...activeClearance, status: "active" };

        const requestQuery = query(collection(db, "clearanceRequests"), where("vehicleNumber", "==", vehicleNumber));
        const requestSnap = await getDocs(requestQuery);
        const allRequests = requestSnap.docs
            .map(d => ({ id: d.id, ...d.data() }))
            .sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));

        if (allRequests.length > 0) return allRequests[0];

        const allClearances = clearanceSnap.docs
            .map(d => ({ id: d.id, ...d.data() }))
            .sort((a, b) => (b.expiryDate?.toMillis() || 0) - (a.expiryDate?.toMillis() || 0));

        if (allClearances.length > 0) return { ...allClearances[0], status: "expired" };
        return null;
    };

    // ─────────────────────────────────────────
    //  INIT
    // ─────────────────────────────────────────
    renderLandingPage();

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            try { await signInAnonymously(auth); } catch(e) { console.error("Anonymous sign-in failed", e); }
        }
    });

    // ─────────────────────────────────────────
    //  EVENTS
    // ─────────────────────────────────────────
    document.body.addEventListener("click", async (e) => {
        const button = e.target.closest('button');
        if (!button) return;
        if (button.id === "request-btn") { routeHistory.push(() => renderLandingPage()); renderRequestForm(); }
        else if (button.id === "back-btn") goBack();
        else if (button.id === "clear-tracking-btn") renderLandingPage();
    });

    document.body.addEventListener("submit", async (e) => {
        e.preventDefault();
        const form = e.target;
        const button = form.querySelector('button[type="submit"]');

        try {
            // ── Track form ──
            if (form.id === "track-request-form") {
                if (button) button.disabled = true;
                const vehicleNumber = document.getElementById("track-id-input").value.trim().toUpperCase();
                if (!vehicleNumber) { if (button) button.disabled = false; return; }

                const loadingHTML = `<div style="padding:20px;text-align:center;"><div style="width:28px;height:28px;border:3px solid rgba(37,99,235,0.2);border-top-color:#2563eb;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto;"></div></div>`;
                renderLandingPage({ trackingResultHTML: loadingHTML, vehicleNumber });

                if (!auth.currentUser) await signInAnonymously(auth);
                const status = await findCurrentVehicleStatus(vehicleNumber);

                if (status) {
                    renderLandingPage({ trackingResultHTML: createStatusCard(status), vehicleNumber });
                } else {
                    const notFoundHTML = `<div style="padding:14px;background:rgba(220,38,38,0.04);border:1px solid rgba(220,38,38,0.18);border-radius:10px;text-align:center;"><p style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:#b91c1c;margin:0;">No records found for ${vehicleNumber}</p></div>`;
                    renderLandingPage({ trackingResultHTML: notFoundHTML, vehicleNumber });
                }
                if (button) button.disabled = false;
            }

            // ── Request form ──
            else if (form.id === "request-form") {
                if (!form.checkValidity()) { showNotification("Please fill out all required fields.", "error"); return; }

                const data = getFormObj(form);
                const entryDate = parseLocalDate(data.entryDate);
                if (!entryDate) { showNotification("Invalid date selected.", "error"); return; }

                if (button) { button.disabled = true; button.innerHTML = "Checking availability…"; }

                try {
                    let maxRed = 15, maxWhite = 15;
                    const configSnap = await getDoc(doc(db, "publicConfig", "parkingSettings"));
                    if (configSnap.exists()) {
                        const cd = configSnap.data();
                        maxRed   = (parseInt(cd.Red?.allocated) || 0) + (parseInt(cd.Red?.buffer) || 0);
                        maxWhite = (parseInt(cd.White?.allocated) || 0) + (parseInt(cd.White?.buffer) || 0);
                    }

                    const startOfDay = new Date(entryDate); startOfDay.setHours(0,0,0,0);
                    const endOfDay   = new Date(startOfDay); endOfDay.setHours(23,59,59,999);

                    const snap = await getDocs(query(
                        collection(db, "vehicleClearances"),
                        where("entryDate", ">=", Timestamp.fromDate(startOfDay)),
                        where("entryDate", "<=", Timestamp.fromDate(endOfDay))
                    ));

                    let redCount = 0, whiteCount = 0;
                    snap.forEach(d => {
                        if (d.data().parkingZone === 'Red')   redCount++;
                        if (d.data().parkingZone === 'White') whiteCount++;
                    });

                    if (redCount >= maxRed && whiteCount >= maxWhite) {
                        showNotification("The selected date is fully booked. Please select another date.", "error");
                        if (button) { button.innerHTML = "Submit Request"; button.disabled = false; }
                        return;
                    }
                } catch (checkErr) {
                    console.error("Availability check error:", checkErr);
                    showNotification("Network error checking availability. Proceeding…", "info");
                }

                let notes = data.notes_purpose;
                if (notes === 'Others') notes = data.notes_other || '';

                let host = data.host_select;
                if (host === 'Others') host = data.host_other || '';

                const payload = {
                    requesterName: data.requesterName, requesterEmail: data.requesterEmail,
                    requesterContact: data.requesterContact, requesterId: auth.currentUser?.uid,
                    vehicleNumber: data.vehicleNumber.toUpperCase(), vehicleType: data.vehicleType,
                    host: host, location: data.location, timeSlot: data.timeSlot,
                    entryDate: Timestamp.fromDate(entryDate), expiryDate: Timestamp.fromDate(entryDate),
                    notes: notes, escortRequired: false, status: "pending", createdAt: Timestamp.now()
                };

                await addDoc(collection(db, "clearanceRequests"), payload);

                if (payload.requesterEmail) {
                    sendEmail(
                        payload.requesterEmail,
                        `Request Received: ${payload.vehicleNumber}`,
                        generateNotificationEmail('pending', { requesterName: payload.requesterName, vehicleNumber: payload.vehicleNumber, submittedAt: new Date().toLocaleString() })
                    );
                }

                showNotification("Request submitted successfully!");
                renderLandingPage({ trackingResultHTML: createStatusCard(payload), vehicleNumber: payload.vehicleNumber });
                if (button) { button.innerHTML = "Submit Request"; button.disabled = false; }
            }

        } catch (error) {
            showNotification(`Error: ${error.message}`, "error");
            if (button) { button.innerHTML = "Submit Request"; button.disabled = false; }
        }
    });

    document.body.addEventListener("change", (e) => {
        const t = e.target;
        if (t.id === 'request-entry-date') {
            const exp = document.getElementById('request-expiry-date');
            if (exp) exp.value = t.value;
        }
        if (t.id === 'notes-purpose-select') {
            const oi = document.getElementById('notes-other-input');
            if (oi) { oi.style.display = t.value === 'Others' ? 'block' : 'none'; oi.required = t.value === 'Others'; if (t.value !== 'Others') oi.value = ''; }
        }
        if (t.id === 'host-select') {
            const oi = document.getElementById('host-other-input');
            if (oi) { oi.style.display = t.value === 'Others' ? 'block' : 'none'; oi.required = t.value === 'Others'; if (t.value !== 'Others') oi.value = ''; }
        }
    });
</script>
